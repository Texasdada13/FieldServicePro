services:
  - type: web
    name: fieldservicepro
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn web.app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
