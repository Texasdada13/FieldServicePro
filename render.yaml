# Render Blueprint — 4MAN Services Pro (4MAN-SERVICES-PRO branch)
#
# Provisions:
#   - Web service          (Python/Flask + gunicorn, plan: starter)
#   - Persistent disk      (10 GB, mounted for user uploads)
#   - PostgreSQL database  (plan: basic-256mb — upgrade later in dashboard)
#
# DATABASE_URL is auto-wired from the database to the web service via
# `fromDatabase`, so no manual paste is required.

services:
  - type: web
    name: 4man-services-pro
    runtime: python
    plan: starter   # web service plan — upgrade to standard/pro as load grows
    region: oregon  # MUST match database region for the Internal connection string
    branch: 4MAN-SERVICES-PRO
    buildCommand: "bash build.sh"
    startCommand: "gunicorn web.app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -"
    healthCheckPath: /health
    autoDeploy: true

    # Persistent disk for user uploads (job photos, documents, attachments).
    # Without this, every deploy/restart wipes uploaded files.
    disk:
      name: 4man-uploads
      mountPath: /var/data/uploads
      sizeGB: 10

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"

      - key: FLASK_ENV
        value: production

      - key: SECRET_KEY
        generateValue: true   # Render generates a secure random value once

      # Point uploads at the persistent disk above
      - key: UPLOAD_FOLDER
        value: /var/data/uploads

      # ── Database (auto-wired from the blueprint Postgres below) ──
      - key: DATABASE_URL
        fromDatabase:
          name: 4man-services-pro-db
          property: connectionString

      # ── Anthropic / AI chat panel ──
      # Required to enable the chat panel. Without it, /api/chat returns 503
      # gracefully — the rest of the app continues to work normally.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional override for the Claude model. Leave unset to use the
      # in-code default (see src/ai_core/claude_client.py).
      - key: CLAUDE_MODEL
        sync: false

      # Operator-only token to authorize wiping & re-seeding the demo org via
      # GET /demo?reset=1&token=<value>. Without this set, /demo?reset=1 is a no-op.
      - key: DEMO_RESET_TOKEN
        sync: false

      # ── SMTP / email (optional — leave unset to keep console-only emails) ──
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USE_TLS
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false

databases:
  - name: 4man-services-pro-db
    databaseName: fourman_services_pro   # actual Postgres database name
    user: fsp_admin
    plan: basic-256mb   # Render's smallest paid Postgres tier — upgrade later
    region: oregon      # MUST match the web service region above
    ipAllowList: []     # Internal-only: web service connects via private network
