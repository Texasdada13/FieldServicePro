<!-- Notification Bell Dropdown -->
<div class="dropdown" id="notifBellDropdown" style="position:relative;">
    <button class="topbar-icon-btn" id="notifBellBtn" aria-label="Notifications" title="Notifications" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
        <i class="bi bi-bell" aria-hidden="true"></i>
        <span class="badge-dot" id="notifDot" style="display:none;" aria-hidden="true"></span>
        <span id="notifBellCount" style="display:none;position:absolute;top:-2px;right:-2px;background:var(--color-danger);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 4px;">0</span>
    </button>
    <div class="dropdown-menu dropdown-menu-end" style="width:360px;max-height:440px;overflow-y:auto;padding:0;border:1px solid var(--color-border);box-shadow:var(--shadow-lg);border-radius:var(--radius-md);">
        <!-- Header -->
        <div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-2) var(--space-3);border-bottom:1px solid var(--color-border);background:var(--color-surface-raised);">
            <span style="font-weight:700;font-size:var(--font-size-sm);">Notifications</span>
            <div style="display:flex;gap:var(--space-2);">
                <button onclick="markAllReadBell()" id="bellMarkAll" style="background:none;border:none;cursor:pointer;font-size:var(--font-size-xs);color:var(--color-accent);display:none;">Mark all read</button>
                <a href="/notifications" style="font-size:var(--font-size-xs);color:var(--color-accent);text-decoration:none;">View all</a>
            </div>
        </div>
        <!-- List -->
        <div id="notifBellList">
            <div style="padding:var(--space-4);text-align:center;color:var(--color-text-muted);font-size:var(--font-size-sm);">
                <i class="bi bi-bell-slash" style="font-size:1.4rem;opacity:0.3;display:block;margin-bottom:var(--space-1);"></i>
                No new notifications
            </div>
        </div>
        <!-- Footer -->
        <div style="padding:var(--space-2);border-top:1px solid var(--color-border);text-align:center;">
            <a href="/settings/notifications" style="font-size:var(--font-size-xs);color:var(--color-text-muted);text-decoration:none;">
                <i class="bi bi-gear"></i> Preferences
            </a>
        </div>
    </div>
</div>
