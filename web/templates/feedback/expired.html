{% extends "booking/base.html" %}
{% block title %}Survey Expired{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="booking-card text-center">
    <div style="font-size:3rem;">&#9200;</div>
    <h3 class="fw-bold mb-2">Survey Expired</h3>
    <p class="text-muted">This survey link has expired. If you'd like to share feedback, please contact us directly.</p>
    {% if org and org.phone %}
    <p class="mt-3"><a href="tel:{{ org.phone }}" class="fw-bold" style="color:var(--book-primary);">{{ org.phone }}</a></p>
    {% endif %}
  </div>
</div>
{% endblock %}
