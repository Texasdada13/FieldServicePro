{% extends "portal/email/base_email.html" %}

{% block content %}
<h2 style="color:#1e293b;margin-top:0;">Password Reset</h2>
<p style="color:#475569;">We received a request to reset your portal password. Click the button below to set a new password.</p>

<div style="text-align:center;margin:32px 0;">
    <a href="{{ reset_url }}" style="display:inline-block;padding:12px 32px;background:#2563eb;color:white;text-decoration:none;border-radius:6px;font-weight:bold;">Reset Password</a>
</div>

<p style="color:#64748b;font-size:14px;">This link expires in 24 hours. If you didn't request this, please ignore this email.</p>
{% endblock %}
