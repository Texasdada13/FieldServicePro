<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal Login — FieldServicePro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/portal.css') }}">
    <style>
        body { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
    <div style="width:100%;max-width:420px;">
        <div class="portal-card" style="padding:2.5rem;">
            <div style="text-align:center;margin-bottom:1.5rem;">
                <i class="bi bi-tools" style="font-size:2rem;color:var(--portal-primary);"></i>
                <h2 style="font-size:1.4rem;font-weight:700;color:var(--portal-primary);margin-top:0.5rem;">Client Portal</h2>
                <p style="color:var(--portal-text-muted);font-size:0.9rem;margin:0;">Sign in to manage your services</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category if category != 'message' else 'info' }} py-2 mb-3"
                 style="font-size:0.85rem;border-radius:var(--portal-radius);">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('portal_auth.portal_login') }}">
                <div class="mb-3">
                    <label for="email" class="form-label" style="font-weight:600;font-size:0.85rem;">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="your@email.com" required autofocus
                               style="border-radius:0 var(--portal-radius) var(--portal-radius) 0;">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label" style="font-weight:600;font-size:0.85rem;">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Enter your password" required
                               style="border-radius:0 var(--portal-radius) var(--portal-radius) 0;">
                    </div>
                </div>

                <div class="d-flex justify-content-end mb-3">
                    <a href="{{ url_for('portal_auth.portal_forgot_password') }}"
                       style="font-size:0.85rem;color:var(--portal-primary);">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-portal btn-portal-primary" style="width:100%;">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>
        </div>
    </div>
</body>
</html>
