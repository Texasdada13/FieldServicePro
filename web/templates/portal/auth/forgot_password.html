<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Client Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/portal.css') }}">
    <style>
        body { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
    <div style="width:100%;max-width:420px;">
        <div class="portal-card" style="padding:2.5rem;">
            <div style="text-align:center;margin-bottom:1.5rem;">
                <i class="bi bi-key" style="font-size:2rem;color:var(--portal-primary);"></i>
                <h2 style="font-size:1.4rem;font-weight:700;color:var(--portal-primary);margin-top:0.5rem;">Reset Password</h2>
                <p style="color:var(--portal-text-muted);font-size:0.9rem;margin:0;">Enter your email to receive a reset link</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category if category != 'message' else 'info' }} py-2 mb-3"
                 style="font-size:0.85rem;border-radius:var(--portal-radius);">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label" style="font-weight:600;font-size:0.85rem;">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="your@email.com" required autofocus
                           style="border-radius:var(--portal-radius);">
                </div>

                <button type="submit" class="btn btn-portal btn-portal-primary mb-3" style="width:100%;">
                    <i class="bi bi-send"></i> Send Reset Link
                </button>

                <div style="text-align:center;">
                    <a href="{{ url_for('portal_auth.portal_login') }}"
                       style="font-size:0.85rem;color:var(--portal-primary);">
                        <i class="bi bi-arrow-left"></i> Back to login
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
