<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — Client Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/portal.css') }}">
    <style>
        body { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
    <div style="width:100%;max-width:420px;">
        <div class="portal-card" style="padding:2.5rem;">
            <div style="text-align:center;margin-bottom:1.5rem;">
                <i class="bi bi-shield-lock" style="font-size:2rem;color:var(--portal-primary);"></i>
                <h2 style="font-size:1.4rem;font-weight:700;color:var(--portal-primary);margin-top:0.5rem;">Set New Password</h2>
                <p style="color:var(--portal-text-muted);font-size:0.9rem;margin:0;">Choose a strong password for your account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category if category != 'message' else 'info' }} py-2 mb-3"
                 style="font-size:0.85rem;border-radius:var(--portal-radius);">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label for="password" class="form-label" style="font-weight:600;font-size:0.85rem;">New Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="At least 8 characters" required minlength="8"
                           style="border-radius:var(--portal-radius);">
                    <div class="form-text">Must contain at least one letter and one number.</div>
                </div>

                <div class="mb-3">
                    <label for="confirm_password" class="form-label" style="font-weight:600;font-size:0.85rem;">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                           placeholder="Re-enter your password" required
                           style="border-radius:var(--portal-radius);">
                </div>

                <button type="submit" class="btn btn-portal btn-portal-primary" style="width:100%;">
                    <i class="bi bi-check-circle"></i> Set Password
                </button>
            </form>
        </div>
    </div>
</body>
</html>
