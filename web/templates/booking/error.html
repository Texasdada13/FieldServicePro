{% extends "booking/base.html" %}
{% block title %}Error{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="booking-card text-center">
    <div style="font-size:4rem;color:var(--book-danger);margin-bottom:1rem;">&#9888;&#65039;</div>
    <h2 class="fw-bold mb-2">Something went wrong</h2>
    <p class="text-muted mb-4">{{ message or 'An error occurred. Please try again.' }}</p>
    <a href="{{ url_for('booking.form') }}" class="btn-book-next" style="display:inline-block;text-decoration:none;">
      <i class="bi bi-arrow-left"></i> Try Again
    </a>
    {% if org and org.phone %}
    <p class="text-muted small mt-4">
      Or call us directly: <a href="tel:{{ org.phone }}" class="fw-bold">{{ org.phone }}</a>
    </p>
    {% endif %}
  </div>
</div>
{% endblock %}
