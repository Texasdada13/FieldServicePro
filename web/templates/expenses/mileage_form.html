{% extends "base.html" %}
{% block title %}Log Mileage{% endblock %}

{% block content %}
<div style="margin-bottom:var(--space-2);"><a href="{{ url_for('expenses.expense_list') }}" style="color:var(--color-text-muted);text-decoration:none;font-size:var(--font-size-sm);"><i class="bi bi-arrow-left"></i> Back</a></div>
<h1 style="margin:0 0 var(--space-4);">Log Mileage</h1>

<div style="max-width:700px;">
<form method="POST">
    <div class="card" style="margin-bottom:var(--space-4);">
        <div class="card-header"><h3 class="card-title"><i class="bi bi-speedometer2" style="color:var(--color-warning);"></i> Trip Details</h3></div>
        <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin-bottom:var(--space-3);">
                <div class="form-group"><label class="form-label">Start Location *</label><input type="text" name="start_location" class="form-control" required placeholder="e.g., Office — 123 Main St"></div>
                <div class="form-group"><label class="form-label">End Location *</label><input type="text" name="end_location" class="form-control" required placeholder="e.g., Job site address"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-3);margin-bottom:var(--space-3);">
                <div class="form-group"><label class="form-label">Distance (miles) *</label><input type="number" name="distance_miles" id="distMiles" class="form-control" step="0.1" min="0" required oninput="calcMileage()"></div>
                <div class="form-group"><label class="form-label">Rate ($/mile)</label><input type="number" name="mileage_rate" id="mileRate" class="form-control" step="0.0001" min="0" value="{{ mileage_rate }}" oninput="calcMileage()"></div>
                <div class="form-group"><label class="form-label">Date *</label><input type="date" name="expense_date" class="form-control" required></div>
            </div>
            <label style="display:flex;align-items:center;gap:var(--space-2);cursor:pointer;margin-bottom:var(--space-3);">
                <input type="checkbox" name="is_round_trip" id="roundTrip" onchange="calcMileage()"> <span style="font-weight:500;">Round Trip (doubles mileage)</span>
            </label>
        </div>
    </div>

    <!-- Calculated -->
    <div class="card" style="margin-bottom:var(--space-4);background:rgba(13,148,136,0.04);border:1px solid rgba(13,148,136,0.15);">
        <div class="card-body" style="text-align:center;padding:var(--space-4);">
            <div style="font-size:var(--font-size-xs);color:var(--color-text-muted);">Calculated Reimbursement</div>
            <div style="font-size:var(--font-size-3xl);font-weight:700;color:var(--color-accent);" id="mileTotal">$0.00</div>
            <div style="font-size:var(--font-size-xs);color:var(--color-text-muted);" id="mileDesc">0.0 miles × $0.67/mile</div>
        </div>
    </div>

    <div class="card" style="margin-bottom:var(--space-4);">
        <div class="card-header"><h3 class="card-title">Purpose & Linkage</h3></div>
        <div class="card-body">
            <div class="form-group" style="margin-bottom:var(--space-3);"><label class="form-label">Purpose</label><input type="text" name="purpose" class="form-control" placeholder="e.g., Travel to job site"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin-bottom:var(--space-3);">
                <div class="form-group"><label class="form-label">Job</label>
                    <select name="job_id" class="form-control"><option value="">—</option>{% for j in jobs %}<option value="{{ j.id }}">{{ j.job_number }} — {{ j.title[:30] }}</option>{% endfor %}</select>
                </div>
                <div class="form-group"><label class="form-label">Vehicle</label>
                    <select name="vehicle_id" class="form-control"><option value="">—</option></select>
                </div>
            </div>
            <label style="display:flex;align-items:center;gap:var(--space-2);cursor:pointer;">
                <input type="checkbox" name="is_reimbursable" checked> <span style="font-weight:500;">Reimbursable</span>
            </label>
        </div>
    </div>

    <div style="display:flex;gap:var(--space-2);justify-content:flex-end;">
        <a href="{{ url_for('expenses.expense_list') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-accent"><i class="bi bi-speedometer2"></i> Log Mileage</button>
    </div>
</form>
</div>

<script>
function calcMileage() {
    var miles = parseFloat(document.getElementById('distMiles').value) || 0;
    var rate = parseFloat(document.getElementById('mileRate').value) || 0;
    var rt = document.getElementById('roundTrip').checked;
    var eff = rt ? miles * 2 : miles;
    var total = eff * rate;
    document.getElementById('mileTotal').textContent = '$' + total.toFixed(2);
    document.getElementById('mileDesc').textContent = eff.toFixed(1) + ' miles × $' + rate.toFixed(4) + '/mile' + (rt ? ' (round trip)' : '');
}
</script>
{% endblock %}
