{% extends "base.html" %}
{% block title %}{{ 'Edit' if pl else 'New' }} Punch List{% endblock %}

{% block content %}
<div style="max-width:650px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-4);">
        <h1 style="margin:0;">{{ 'Edit' if pl else 'New' }} Punch List</h1>
        <a href="{{ url_for('punch_lists.punch_list_index') }}" class="btn btn-ghost" style="font-size:var(--font-size-sm);"><i class="bi bi-arrow-left"></i> Back</a>
    </div>

    <form method="POST">
        <div class="card" style="padding:var(--space-4);margin-bottom:var(--space-4);">
            <div class="form-group" style="margin-bottom:var(--space-3);"><label class="form-label">Project *</label>
                <select name="project_id" class="form-select" required {% if pl %}disabled{% endif %}><option value="">Select...</option>{% for p in projects %}<option value="{{ p.id }}" {% if (pl and pl.project_id == p.id) or (project and project.id == p.id) %}selected{% endif %}>{{ p.title }}</option>{% endfor %}</select>
                {% if pl %}<input type="hidden" name="project_id" value="{{ pl.project_id }}">{% endif %}
            </div>
            <div class="form-group" style="margin-bottom:var(--space-3);"><label class="form-label">Title *</label><input type="text" name="title" class="form-control" required value="{{ pl.title if pl else '' }}" placeholder="e.g., Final Walkthrough - Building A"></div>
            <div class="form-group" style="margin-bottom:var(--space-3);"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3">{{ pl.description if pl else '' }}</textarea></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin-bottom:var(--space-3);">
                <div class="form-group"><label class="form-label">Inspection Date</label><input type="date" name="inspection_date" class="form-control" value="{{ pl.inspection_date.strftime('%Y-%m-%d') if pl and pl.inspection_date else '' }}"></div>
                <div class="form-group"><label class="form-label">Inspected By</label><input type="text" name="inspected_by" class="form-control" value="{{ pl.inspected_by if pl else '' }}" placeholder="Client rep, inspector..."></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin-bottom:var(--space-3);">
                <div class="form-group"><label class="form-label">Due Date</label><input type="date" name="due_date" class="form-control" value="{{ pl.due_date.strftime('%Y-%m-%d') if pl and pl.due_date else '' }}"></div>
                <div class="form-group"><label class="form-label">Status</label><select name="status" class="form-select"><option value="draft" {% if pl and pl.status == 'draft' %}selected{% endif %}>Draft</option><option value="active" {% if (pl and pl.status == 'active') or not pl %}selected{% endif %}>Active</option></select></div>
            </div>
            <div class="form-group"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2">{{ pl.notes if pl else '' }}</textarea></div>
        </div>
        <div style="display:flex;gap:var(--space-2);justify-content:flex-end;"><a href="{{ url_for('punch_lists.punch_list_index') }}" class="btn btn-ghost">Cancel</a><button type="submit" class="btn btn-accent"><i class="bi bi-check-lg"></i> {{ 'Update' if pl else 'Create' }} Punch List</button></div>
    </form>
</div>
{% endblock %}
