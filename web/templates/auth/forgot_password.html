{% extends "auth/base_auth.html" %}

{% block title %}Forgot Password - FieldServicePro{% endblock %}

{% block content %}
<h2 class="auth-title">Reset your password</h2>
<p class="auth-description">Enter your email and we'll send you a reset link</p>

<form method="POST" action="{{ url_for('auth.forgot_password') }}">
    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@fieldservicepro.app" required autofocus>
    </div>
    <button type="submit" class="btn btn-primary">Send Reset Link</button>
</form>

<div class="auth-links">
    <p>Remember your password?</p>
    <a href="{{ url_for('auth.login') }}">Back to sign in</a>
</div>
{% endblock %}
