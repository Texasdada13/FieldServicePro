<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FieldServicePro{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0d9488 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container { width: 100%; max-width: 420px; }
        .auth-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-logo {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .auth-logo-accent { color: #0d9488; }
        .auth-subtitle { color: #64748b; font-size: 14px; }
        .auth-title { font-size: 24px; font-weight: 600; color: #1e293b; margin-bottom: 8px; }
        .auth-description { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        label { display: block; font-size: 14px; font-weight: 500; color: #1e293b; margin-bottom: 6px; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0;
            border-radius: 8px; font-size: 15px; font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #1e293b;
        }
        input:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15); }
        input::placeholder { color: #94a3b8; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #0d9488; }
        .checkbox-group label { margin-bottom: 0; cursor: pointer; font-weight: 400; }
        .btn {
            display: inline-block; padding: 14px 24px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            text-align: center; text-decoration: none; font-family: inherit;
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: #fff;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(13, 148, 136, 0.4); }
        .auth-links { text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #e2e8f0; }
        .auth-links a { color: #0d9488; text-decoration: none; font-size: 14px; }
        .auth-links a:hover { text-decoration: underline; }
        .auth-links p { color: #64748b; font-size: 14px; margin-bottom: 8px; }
        .flash-messages { margin-bottom: 20px; }
        .flash { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 10px; border-left: 4px solid; }
        .flash-error { background: #fee2e2; color: #dc2626; border-color: #ef4444; }
        .flash-success { background: #d1fae5; color: #059669; border-color: #10b981; }
        .flash-info { background: rgba(13,148,136,0.06); color: #0f766e; border-color: #0d9488; }
        .password-strength { margin-top: 8px; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
        .password-strength-bar { height: 100%; transition: width 0.3s, background-color 0.3s; }
        .strength-weak { width: 33%; background: #ef4444; }
        .strength-medium { width: 66%; background: #f59e0b; }
        .strength-strong { width: 100%; background: #10b981; }
        .terms-text { font-size: 12px; color: #64748b; line-height: 1.5; }
        .terms-text a { color: #0d9488; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <rect width="28" height="28" rx="7" fill="#0d9488"/>
                        <path d="M7 10h14M7 14h10M7 18h7" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="21" cy="18" r="3" fill="#f59e0b"/>
                    </svg>
                    Field<span class="auth-logo-accent">ServicePro</span>
                </div>
                <div class="auth-subtitle">Plumbing &bull; HVAC &bull; Electrical &bull; General Contracting</div>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash flash-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
