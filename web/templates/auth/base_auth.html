<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FieldServicePro{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container { width: 100%; max-width: 420px; }
        .auth-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-logo {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }
        .auth-logo-accent { color: #2563eb; }
        .auth-subtitle { color: #666; font-size: 14px; }
        .auth-title { font-size: 24px; font-weight: 600; color: #0f172a; margin-bottom: 8px; }
        .auth-description { color: #666; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 6px; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 15px; transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        input::placeholder { color: #aaa; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-group label { margin-bottom: 0; cursor: pointer; font-weight: 400; }
        .btn {
            display: inline-block; padding: 14px 24px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            text-align: center; text-decoration: none;
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #fff;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); }
        .auth-links { text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #eee; }
        .auth-links a { color: #2563eb; text-decoration: none; font-size: 14px; }
        .auth-links a:hover { text-decoration: underline; }
        .auth-links p { color: #666; font-size: 14px; margin-bottom: 8px; }
        .flash-messages { margin-bottom: 20px; }
        .flash { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
        .flash-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .flash-success { background: #d1fae5; color: #059669; border: 1px solid #a7f3d0; }
        .flash-info { background: #dbeafe; color: #2563eb; border: 1px solid #bfdbfe; }
        .password-strength { margin-top: 8px; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; }
        .password-strength-bar { height: 100%; transition: width 0.3s, background-color 0.3s; }
        .strength-weak { width: 33%; background: #dc2626; }
        .strength-medium { width: 66%; background: #f59e0b; }
        .strength-strong { width: 100%; background: #059669; }
        .terms-text { font-size: 12px; color: #666; line-height: 1.5; }
        .terms-text a { color: #2563eb; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">Field<span class="auth-logo-accent">ServicePro</span></div>
                <div class="auth-subtitle">Plumbing &bull; HVAC &bull; Electrical &bull; General Contracting</div>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash flash-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
